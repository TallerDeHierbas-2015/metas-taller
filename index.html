<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metas · Taller de Hierbas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
  :root {
    --verde:    #2D5A27;
    --verde-c:  #4A7C42;
    --verde-m:  #8FBC8B;
    --crema:    #F7F3EC;
    --crema-o:  #EDE8DF;
    --tierra:   #C4956A;
    --rojo:     #C0392B;
    --amarillo: #E8A020;
    --txt:      #1A1A1A;
    --sub:      #6B6B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--crema);
    font-family: 'DM Sans', sans-serif;
    color: var(--txt);
    min-height: 100vh;
  }
  .hdr {
    background: var(--verde);
    color: var(--crema);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .hdr::before {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,.05);
  }
  .hdr::after {
    content: '';
    position: absolute;
    right: 40px; bottom: -60px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,.03);
  }
  .hdr-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    position: relative;
  }
  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    font-style: italic;
    line-height: 1.1;
  }
  .brand-sub {
    font-size: 12px;
    opacity: .65;
    margin-top: 3px;
    font-weight: 300;
    letter-spacing: .3px;
  }
  .badge-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .badge {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  select#mes-selector {
    background: rgba(255,255,255,.12);
    color: var(--crema);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 14px;
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    max-width: 160px;
  }
  select#mes-selector option { color: var(--txt); }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    position: relative;
  }
  .tc {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .tlabel {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: .65;
    margin-bottom: 5px;
    font-weight: 500;
  }
  .tval {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.5px;
    line-height: 1;
  }
  .tsub {
    font-size: 11px;
    opacity: .7;
    margin-top: 4px;
    line-height: 1.3;
  }
  .statusbar {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,.07);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .status-info {
    font-size: 12px;
    color: var(--sub);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--verde-m);
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .4; }
  }
  .btn-refresh {
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
    flex-shrink: 0;
  }
  .btn-refresh:hover { background: var(--verde-c); }
  .btn-refresh:disabled { opacity: .6; cursor: default; }
  .spin { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .content {
    padding: 20px 20px 56px;
    max-width: 520px;
    margin: 0 auto;
  }
  .nota-fallback {
    background: #FFF8E8;
    border: 1px solid #F0DFAE;
    color: #8A6100;
    font-size: 12px;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .ritmo-box {
    background: #fff;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .ritmo-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ritmo-txt {
    font-size: 13px;
    color: var(--sub);
    line-height: 1.4;
  }
  .ritmo-txt strong { color: var(--txt); }
  .ritmo-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .r-ok  { background: #E8F5E9; color: var(--verde); }
  .r-med { background: #FFF3E0; color: #BF6000; }
  .r-mal { background: #FFEBEE; color: var(--rojo); }
  .barra-total-bg {
    height: 8px;
    background: var(--crema-o);
    border-radius: 99px;
    overflow: hidden;
  }
  .barra-total-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--verde-m), var(--verde-c));
    transition: width .6s ease;
  }
  .sec-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--sub);
    margin: 26px 0 12px;
    padding-left: 12px;
    border-left: 3px solid var(--tierra);
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: transform .1s;
  }
  .card:active { transform: scale(.99); }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .cnombre {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cpct {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.5px;
    line-height: 1;
  }
  .cv { color: var(--verde); }
  .ca { color: var(--amarillo); }
  .cr { color: var(--rojo); }
  .bar-bg {
    height: 8px;
    background: var(--crema-o);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 9px;
  }
  .bar {
    height: 100%;
    border-radius: 99px;
    transition: width .6s ease;
  }
  .bv { background: linear-gradient(90deg, var(--verde-m), var(--verde-c)); }
  .ba { background: linear-gradient(90deg, #F0C060, var(--amarillo)); }
  .br { background: linear-gradient(90deg, #E07060, var(--rojo)); }
  .nums {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 6px;
  }
  .nreal { font-weight: 600; color: var(--txt); }
  .pace-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--sub);
    border-top: 1px dashed var(--crema-o);
    padding-top: 7px;
    flex-wrap: wrap;
    gap: 4px;
  }
  .pv { color: var(--verde); font-weight: 600; }
  .pa { color: #BF6000;      font-weight: 600; }
  .pr { color: var(--rojo);  font-weight: 600; }
  .state-box {
    text-align: center;
    padding: 60px 24px;
    color: var(--sub);
  }
  .state-box .icon { font-size: 40px; margin-bottom: 12px; }
  .state-box p { font-size: 14px; line-height: 1.5; }
  .state-box .err { color: var(--rojo); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div id="hdr-placeholder"></div>
<div class="statusbar">
  <div class="status-info">
    <span class="dot"></span>
    <span id="status-txt">Cargando datos…</span>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="cargar(true)">
    <span id="refresh-icon">↻</span> Actualizar
  </button>
</div>
<div class="content" id="content">
  <div class="state-box">
    <div class="icon">🌿</div>
    <p>Cargando datos de ventas…</p>
  </div>
</div>
<script>
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbyycrOQuEjz9Ej5jjOfYd1fshAuVdJ5qo865ZfuZrDbooHZdI1-Jy3JAuh46sbar3w/exec';

const EMOJIS = {
  'Tienda Poblado':'🏪','Tienda Laureles':'🏪','Tienda Zona 2':'🏪',
  'Tienda San Lucas':'🏪','Tienda Retiro':'🌿','Tienda Bogotá':'🏪',
  'Redes Sociales':'📱','Dist/Institucional':'🤝','Digital (PW+Rappi)':'💻',
};
const SECCIONES = {
  'Tiendas Físicas':    ['Tienda Retiro','Tienda Poblado','Tienda Laureles','Tienda Zona 2','Tienda San Lucas','Tienda Bogotá'],
  'Digital & Delivery': ['Digital (PW+Rappi)','Redes Sociales'],
  'B2B':                ['Dist/Institucional'],
};

let mesSeleccionado = ''; // '' = mes en curso (en vivo)

function fmt(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000)    return '$' + Math.round(n / 1000) + 'K';
  return '$' + Math.round(n).toLocaleString('es-CO');
}
function nombreMes(mesKey) {
  const [anio, mes] = mesKey.split('-').map(Number);
  const d = new Date(anio, mes - 1, 1);
  const nombre = d.toLocaleString('es-CO', { month: 'long', timeZone: 'America/Bogota' });
  return nombre.charAt(0).toUpperCase() + nombre.slice(1) + ' ' + anio;
}

function renderizar(data) {
  const ventas    = data.canales || {};
  const metas     = data.metas || {};
  const metaTotal = data.metaTotal || 0;
  const cerrado   = !!data.cerrado;
  const mesKey    = data.mesConsultado || data.mesActual;

  const totalV = Object.values(ventas).reduce((a, b) => a + b, 0);
  const pctT   = metaTotal > 0 ? (totalV / metaTotal * 100).toFixed(1) : '0.0';
  const barraW = metaTotal > 0 ? Math.min(totalV / metaTotal * 100, 100).toFixed(1) : 0;

  // Solo aplica ritmo/días restantes al mes en curso (no a meses cerrados)
  let diaAct = 0, diasMes = 0, diasRest = 0, metaHoy = 0, ritmoG = 0, rTxt = '', rCls = '';
  if (!cerrado) {
    const hoy = new Date();
    diaAct   = hoy.getDate();
    diasMes  = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate();
    diasRest = diasMes - diaAct;
    const fraccion = diaAct / diasMes;
    metaHoy  = metaTotal * fraccion;
    ritmoG   = metaHoy > 0 ? totalV / metaHoy : 0;
    if (ritmoG >= 1)       { rTxt = '✅ ' + Math.round(ritmoG * 100) + '% del ritmo'; rCls = 'r-ok'; }
    else if (ritmoG >= .8) { rTxt = '⚡ ' + Math.round(ritmoG * 100) + '% del ritmo'; rCls = 'r-med'; }
    else                   { rTxt = '⚠️ ' + Math.round(ritmoG * 100) + '% del ritmo'; rCls = 'r-mal'; }
  }

  let actTxt = '—';
  if (data.actualizado) {
    const d = new Date(data.actualizado);
    actTxt = d.toLocaleString('es-CO', {
      timeZone: 'America/Bogota',
      day: '2-digit', month: 'short',
      hour: '2-digit', minute: '2-digit',
    });
  }

  document.getElementById('hdr-placeholder').innerHTML = `
    <div class="hdr">
      <div class="hdr-top">
        <div>
          <div class="brand">Taller de Hierbas</div>
          <div class="brand-sub">Seguimiento de metas · ${mesKey ? nombreMes(mesKey) : ''}</div>
        </div>
        <div class="badge-wrap">
          <div class="badge">${mesKey ? nombreMes(mesKey) : '—'}</div>
          <select id="mes-selector" onchange="cambiarMes(this.value)"></select>
        </div>
      </div>
      <div class="grid2">
        <div class="tc">
          <div class="tlabel">Vendido</div>
          <div class="tval">${fmt(totalV)}</div>
          <div style="font-size:28px;font-weight:700;letter-spacing:-1px;opacity:.95;margin:4px 0 2px;">${pctT}%</div>
          <div class="tsub">de la meta total</div>
        </div>
        <div class="tc">
          <div class="tlabel">Meta total</div>
          <div class="tval">${fmt(metaTotal)}</div>
          <div class="tsub">${cerrado ? 'Mes cerrado' : `Día ${diaAct} de ${diasMes} · faltan ${diasRest}`}</div>
        </div>
      </div>
    </div>`;

  poblarSelector(mesKey);
  document.getElementById('status-txt').textContent = cerrado ? 'Mes cerrado' : ('Actualizado ' + actTxt);

  let html = '';

  if (data.metasDe && data.metasDe !== data.mesActual) {
    html += `<div class="nota-fallback">📌 Aún no hay metas definidas para ${nombreMes(data.mesActual)} — usando las de ${nombreMes(data.metasDe)}.</div>`;
  }

  if (!cerrado) {
    html += `
    <div class="ritmo-box">
      <div class="ritmo-top">
        <div class="ritmo-txt">
          Meta proporcional al día: <strong>${fmt(metaHoy)}</strong><br>
          Faltan <strong>${diasRest} días</strong> en el mes
        </div>
        <div class="ritmo-pill ${rCls}">${rTxt}</div>
      </div>
      <div class="barra-total-bg">
        <div class="barra-total-fill" style="width:${barraW}%"></div>
      </div>
    </div>`;
  }

  for (const [sec, lista] of Object.entries(SECCIONES)) {
    const listaOrdenada = [...lista].sort((a, b) => {
      const pctA = metas[a] > 0 ? (ventas[a] || 0) / metas[a] : 0;
      const pctB = metas[b] > 0 ? (ventas[b] || 0) / metas[b] : 0;
      return pctB - pctA;
    });
    html += `<div class="sec-title">${sec}</div>`;
    for (const canal of listaOrdenada) {
      const meta  = metas[canal] || 0;
      const v     = ventas[canal] || 0;
      const pct   = meta > 0 ? v / meta * 100 : 0;
      const ancho = Math.min(pct, 100).toFixed(1);
      const pctM  = pct.toFixed(1);
      const cc = pct >= 80 ? 'cv' : pct >= 50 ? 'ca' : 'cr';
      const bc = pct >= 80 ? 'bv' : pct >= 50 ? 'ba' : 'br';

      let paceRow = '';
      if (!cerrado) {
        const metaDiaria = meta / diasMes;
        const metaAlDia  = metaDiaria * diaAct;
        const ritmoC     = metaAlDia > 0 ? v / metaAlDia : 0;
        const falta      = diasRest > 0 ? Math.max((meta - v) / diasRest, 0) : 0;
        let pTxt, pCls;
        if (ritmoC >= 1)        { pTxt = '✅ al ritmo';                                    pCls = 'pv'; }
        else if (ritmoC >= .75) { pTxt = '⚡ ' + Math.round(ritmoC * 100) + '% del ritmo'; pCls = 'pa'; }
        else                    { pTxt = '⚠️ ' + Math.round(ritmoC * 100) + '% del ritmo'; pCls = 'pr'; }
        paceRow = `
          <div class="pace-row">
            <span class="${pCls}">${pTxt}</span>
            <span>necesita <strong>${fmt(falta)}/día</strong></span>
          </div>`;
      } else {
        paceRow = `
          <div class="pace-row">
            <span>${pct >= 100 ? '✅ meta cumplida' : '📊 cierre del mes'}</span>
          </div>`;
      }

      html += `
        <div class="card">
          <div class="card-top">
            <div class="cnombre"><span>${EMOJIS[canal] || '📊'}</span>${canal}</div>
            <div class="cpct ${cc}">${pctM}%</div>
          </div>
          <div class="bar-bg"><div class="bar ${bc}" style="width:${ancho}%"></div></div>
          <div class="nums">
            <span class="nreal">${fmt(v)}</span>
            <span>meta ${fmt(meta)}</span>
          </div>
          ${paceRow}
        </div>`;
    }
  }
  document.getElementById('content').innerHTML = html;
}

async function poblarSelector(mesActualKey) {
  const sel = document.getElementById('mes-selector');
  if (!sel || sel.dataset.cargado === '1') {
    if (sel) sel.value = mesSeleccionado;
    return;
  }
  try {
    const r = await fetch(ENDPOINT + '?listar=meses');
    const data = await r.json();
    const meses = data.meses || [];
    let opts = `<option value="">Mes actual${data.mesActual ? ' · ' + nombreMes(data.mesActual) : ''}</option>`;
    for (const m of meses) {
      if (m === data.mesActual) continue;
      opts += `<option value="${m}">${nombreMes(m)}</option>`;
    }
    sel.innerHTML = opts;
    sel.value = mesSeleccionado;
    sel.dataset.cargado = '1';
  } catch (e) {
    console.error('No se pudo cargar la lista de meses', e);
  }
}

function cambiarMes(valor) {
  mesSeleccionado = valor;
  cargar(true);
}

async function cargar(manual = false) {
  const btn  = document.getElementById('btn-refresh');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.classList.add('spin');
  try {
    const url = ENDPOINT + (mesSeleccionado ? '?mes=' + mesSeleccionado : '');
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    renderizar(data);
  } catch (e) {
    if (manual) {
      document.getElementById('status-txt').textContent = 'Error al actualizar';
      document.getElementById('content').innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p>No se pudo conectar con el servidor de datos.</p>
          <p class="err">${e.message}</p>
        </div>`;
    }
  } finally {
    btn.disabled = false;
    icon.classList.remove('spin');
  }
}

cargar();
setInterval(() => { if (!mesSeleccionado) cargar(); }, 5 * 60 * 1000);
</script>
</body>
</html>
